spring.application.name=Worker

# URL base del Backend (incluye /api)
worker.backend.base-url=http://localhost:8080/api

# Habilitar o deshabilitar recordatorios
worker.reminders.enabled=true
# Cron por defecto: todos los días a las 07:00
worker.reminders.cron=0 0 7 * * *

# Configuración MongoDB
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/workerdb}
# Alternativa: definir por separado
# spring.data.mongodb.host=localhost
# spring.data.mongodb.port=27017
# spring.data.mongodb.database=workerdb

# Configuración de correo real (Cargada desde docker-compose.yml)
spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE:true}
spring.mail.from=${SPRING_MAIL_FROM:no-reply@cop.local}

# Configuración Twilio WhatsApp
twilio.account-sid=${TWILIO_ACCOUNT_SID:}
twilio.auth-token=${TWILIO_AUTH_TOKEN:}
twilio.whatsapp-from=${TWILIO_WHATSAPP_FROM:}