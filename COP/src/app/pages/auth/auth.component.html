<div class="auth-container min-h-screen bg-gray-50 flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
  <div class="max-w-md w-full space-y-8 bg-white p-10 rounded-2xl shadow-xl border border-blue-50">
    <div class="text-center">
      <div class="mx-auto h-16 w-16 bg-blue-100 rounded-full flex items-center justify-center mb-4">
        <span class="text-3xl">🦷</span>
      </div>
      <h2 class="text-3xl font-extrabold text-gray-900">
        {{ isLogin ? 'Inicia Sesión' : 'Crea tu Cuenta' }}
      </h2>
      <p class="mt-2 text-sm text-gray-600">
        {{ isLogin ? 'Accede a tus citas y servicios' : 'Regístrate para agendar fácilmente' }}
      </p>
    </div>

    <form class="mt-8 space-y-6" (submit)="onSubmit($event)">
      <div class="grid grid-cols-1 gap-4">
        <div *ngIf="!isLogin">
          <label class="block text-sm font-medium text-gray-700 mb-1">Nombre Completo</label>
          <input [(ngModel)]="form.nombreCompleto" name="nombre" type="text" required class="appearance-none rounded-xl relative block w-full px-4 py-3 border border-gray-300 placeholder-gray-500 text-gray-900 focus:outline-none focus:ring-blue-500 focus:border-blue-500 focus:z-10 sm:text-sm" placeholder="Ej. Juan Pérez">
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Usuario</label>
          <input [(ngModel)]="form.username" name="username" type="text" required class="appearance-none rounded-xl relative block w-full px-4 py-3 border border-gray-300 placeholder-gray-500 text-gray-900 focus:outline-none focus:ring-blue-500 focus:border-blue-500 focus:z-10 sm:text-sm" placeholder="Tu usuario">
        </div>

        <div *ngIf="!isLogin">
          <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
          <input [(ngModel)]="form.email" name="email" type="email" required class="appearance-none rounded-xl relative block w-full px-4 py-3 border border-gray-300 placeholder-gray-500 text-gray-900 focus:outline-none focus:ring-blue-500 focus:border-blue-500 focus:z-10 sm:text-sm" placeholder="correo@ejemplo.com">
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Contraseña</label>
          <input [(ngModel)]="form.password" name="password" type="password" required class="appearance-none rounded-xl relative block w-full px-4 py-3 border border-gray-300 placeholder-gray-500 text-gray-900 focus:outline-none focus:ring-blue-500 focus:border-blue-500 focus:z-10 sm:text-sm" placeholder="••••••••">
        </div>
      </div>

      <div *ngIf="error" class="text-red-500 text-sm text-center bg-red-50 p-2 rounded-lg">
        {{ error }}
      </div>

      <div>
        <button type="submit" [disabled]="loading" class="group relative w-full flex justify-center py-3 px-4 border border-transparent text-sm font-medium rounded-xl text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-all duration-200 shadow-lg shadow-blue-200 disabled:opacity-50">
          {{ loading ? 'Procesando...' : (isLogin ? 'Entrar' : 'Registrarse') }}
        </button>
      </div>

      <div class="text-center mt-4">
        <button type="button" (click)="toggleMode()" class="text-sm font-medium text-blue-600 hover:text-blue-500">
          {{ isLogin ? '¿No tienes cuenta? Regístrate aquí' : '¿Ya tienes cuenta? Inicia sesión' }}
        </button>
      </div>
    </form>
  </div>
</div>
