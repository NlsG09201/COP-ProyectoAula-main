<main class="space-y-24 pb-32 overflow-hidden">
  <!-- Hero Section -->
  <section class="relative pt-32 pb-48">
    <div class="container mx-auto text-center space-y-8 animate-reveal">
      <div class="inline-flex items-center space-x-2 px-4 py-2 rounded-full bg-blue-50 border border-blue-100 text-blue-600 font-bold text-xs uppercase tracking-widest">
        <span>Historias de Éxito</span>
      </div>
      <h1 class="text-5xl md:text-7xl font-black text-slate-900 tracking-tight leading-tight">
        Lo Que Dicen <br>
        <span class="text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-indigo-600">Nuestros Pacientes</span>
      </h1>
      <p class="text-xl text-slate-500 max-w-2xl mx-auto font-medium leading-relaxed">
        Tu satisfacción es nuestro mayor logro. Conoce las historias de quienes ya transformaron su vida con nosotros.
      </p>
    </div>
    
    <div class="absolute top-0 left-1/2 -translate-x-1/2 w-full h-full -z-10 pointer-events-none opacity-30">
      <div class="absolute top-0 left-1/4 w-96 h-96 bg-blue-200 rounded-full blur-[120px]"></div>
      <div class="absolute bottom-0 right-1/4 w-96 h-96 bg-indigo-100 rounded-full blur-[120px]"></div>
    </div>
  </section>

  <!-- Testimonial Form -->
  <section class="container mx-auto -mt-32 relative z-10">
    <div class="max-w-3xl mx-auto glass-card animate-reveal stagger-1">
      <div class="flex items-center space-x-6 mb-12">
        <div class="w-16 h-16 bg-blue-600 rounded-3xl flex items-center justify-center shadow-xl shadow-blue-500/20">
          <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
        </div>
        <div>
          <h2 class="text-3xl font-black text-slate-900">Agrega tu testimonio</h2>
          <p class="text-slate-400 font-bold uppercase tracking-widest text-xs mt-1">Tu opinión nos ayuda a mejorar</p>
        </div>
      </div>

      <form id="formTestimonio" class="space-y-10">
        <div class="space-y-3">
          <label for="testimonial-nombre" class="text-xs font-black text-slate-400 uppercase tracking-widest ml-1">Tu Nombre</label>
          <input type="text" id="testimonial-nombre" name="nombre" class="input-field" placeholder="Ej: Maria García" required>
        </div>
        
        <div class="space-y-3">
          <label for="testimonial-texto" class="text-xs font-black text-slate-400 uppercase tracking-widest ml-1">Tu experiencia</label>
          <textarea id="testimonial-texto" name="mensaje" rows="5" class="input-field resize-none" placeholder="Cuéntanos cómo fue tu proceso..." required></textarea>
        </div>

        <div class="space-y-4">
          <label class="text-xs font-black text-slate-400 uppercase tracking-widest ml-1">Calificación</label>
          <div class="flex items-center bg-slate-50 p-6 rounded-3xl border border-slate-100" id="rating-stars">
            <div class="flex items-center space-x-3 star-rating">
              <i class="fas fa-star text-slate-200 text-3xl" data-rating="1"></i>
              <i class="fas fa-star text-slate-200 text-3xl" data-rating="2"></i>
              <i class="fas fa-star text-slate-200 text-3xl" data-rating="3"></i>
              <i class="fas fa-star text-slate-200 text-3xl" data-rating="4"></i>
              <i class="fas fa-star text-slate-200 text-3xl" data-rating="5"></i>
            </div>
            <span class="ml-8 text-sm font-black text-blue-600 uppercase tracking-widest" id="rating-text">Selecciona estrellas</span>
          </div>
          <input type="hidden" id="calificacion" name="calificacion" value="5" required>
        </div>
        
        <div id="respuesta" class="hidden p-6 rounded-2xl font-bold text-center"></div>

        <div class="pt-6">
          <button type="submit" class="btn-primary w-full !py-5 shadow-2xl">Publicar Testimonio</button>
        </div>
      </form>
    </div>
  </section>

  <!-- Testimonials Grid -->
  <section class="container mx-auto space-y-20">
    <div class="flex flex-col items-center text-center space-y-6">
      <div class="h-1.5 w-24 bg-blue-600 rounded-full"></div>
      <h2 class="text-4xl md:text-6xl font-black text-slate-900 tracking-tight leading-tight">Opiniones <span class="text-blue-600">Reales</span></h2>
      <p class="text-xl text-slate-500 font-medium max-w-xl mx-auto">Voces auténticas de nuestra comunidad.</p>
    </div>

    <div id="testimonials-container" class="grid grid-cols-1 md:grid-cols-3 gap-10">
      <!-- Testimonials injected here -->
    </div>
  </section>
</main>
