<nav class="sticky top-0 z-50 w-full bg-white border-b border-slate-200 shadow-sm py-2">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex justify-between items-center h-12">
      
      <!-- Brand/Logo -->
      <div class="flex-shrink-0 flex items-center gap-2 cursor-pointer" routerLink="/">
        <img src="/assets/Logo.png" alt="COP" class="h-8 w-auto">
        <span class="text-xl font-bold text-slate-900 tracking-tight">COP</span>
      </div>

      <!-- Desktop Navigation -->
      <div class="hidden lg:flex lg:items-center lg:gap-4">
        <a routerLink="/" routerLinkActive="text-blue-600 border-b-2 border-blue-600" [routerLinkActiveOptions]="{exact: true}" 
           class="px-3 py-2 text-sm font-semibold text-slate-700 hover:text-blue-600 transition-colors">
          Inicio
        </a>
        <a routerLink="/servicios" routerLinkActive="text-blue-600 border-b-2 border-blue-600" 
           class="px-3 py-2 text-sm font-semibold text-slate-700 hover:text-blue-600 transition-colors">
          Servicios
        </a>
        <a routerLink="/nosotros" routerLinkActive="text-blue-600 border-b-2 border-blue-600" 
           class="px-3 py-2 text-sm font-semibold text-slate-700 hover:text-blue-600 transition-colors">
          Nosotros
        </a>
        <a routerLink="/testimonios" routerLinkActive="text-blue-600 border-b-2 border-blue-600" 
           class="px-3 py-2 text-sm font-semibold text-slate-700 hover:text-blue-600 transition-colors">
          Testimonios
        </a>
        <a routerLink="/contacto" routerLinkActive="text-blue-600 border-b-2 border-blue-600" 
           class="px-3 py-2 text-sm font-semibold text-slate-700 hover:text-blue-600 transition-colors">
          Contacto
        </a>
      </div>

      <!-- Right Side Actions -->
      <div class="hidden lg:flex lg:items-center lg:gap-3">
        <ng-container *ngIf="!isLoggedIn()">
          <button routerLink="/auth" 
                  class="bg-blue-600 text-white px-5 py-2 rounded-full text-sm font-bold shadow-md hover:bg-blue-700 transition-all active:scale-95">
            Acceso Pacientes
          </button>
        </ng-container>

        <ng-container *ngIf="isLoggedIn()">
          <div class="relative group">
            <button class="flex items-center gap-2 px-4 py-2 border border-slate-200 rounded-full hover:bg-slate-50 transition-colors">
              <i class="fas fa-user text-blue-600 text-sm"></i>
              <span class="text-sm font-bold text-slate-800">{{ getUserName().split(' ')[0] }}</span>
              <i class="fas fa-chevron-down text-slate-400 text-[10px]"></i>
            </button>
            
            <!-- Dropdown Menu -->
            <div class="absolute right-0 w-56 mt-2 bg-white rounded-xl shadow-xl border border-slate-100 opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all z-50 py-2">
              <div class="px-4 py-2 border-b border-slate-50 mb-1">
                <p class="text-[10px] uppercase font-bold text-slate-400 tracking-wider">Paciente</p>
                <p class="text-sm font-bold text-slate-900 truncate">{{ getUserName() }}</p>
              </div>
              <a routerLink="/perfil" class="flex items-center gap-3 px-4 py-2 text-sm text-slate-700 hover:bg-blue-50 hover:text-blue-600 transition-colors">
                <i class="fas fa-user-circle opacity-50"></i> Mi Perfil
              </a>
              <a routerLink="/historial" class="flex items-center gap-3 px-4 py-2 text-sm text-slate-700 hover:bg-blue-50 hover:text-blue-600 transition-colors">
                <i class="fas fa-history opacity-50"></i> Historial Citas
              </a>
              <a routerLink="/estado-cita" class="flex items-center gap-3 px-4 py-2 text-sm text-slate-700 hover:bg-green-50 hover:text-green-600 transition-colors">
                <i class="fas fa-calendar-check opacity-50"></i> Estado de Cita
              </a>
              <a routerLink="/psico-evaluacion" class="flex items-center gap-3 px-4 py-2 text-sm text-slate-700 hover:bg-purple-50 hover:text-purple-600 transition-colors">
                <i class="fas fa-brain opacity-50"></i> Evaluación Mental
              </a>
              <div class="border-t border-slate-50 my-1"></div>
              <button (click)="logout()" class="w-full flex items-center gap-3 px-4 py-2 text-sm text-red-600 font-bold hover:bg-red-50 transition-colors">
                <i class="fas fa-sign-out-alt"></i> Cerrar Sesión
              </button>
            </div>
          </div>
        </ng-container>
      </div>

      <!-- Mobile Menu Button -->
      <div class="flex lg:hidden">
        <button (click)="toggleMenu()" class="text-slate-600 p-2 hover:bg-slate-100 rounded-lg transition-colors">
          <i class="fas" [class.fa-bars]="!menuOpen()" [class.fa-times]="menuOpen()"></i>
        </button>
      </div>
    </div>
  </div>

  <!-- Mobile Menu -->
  <div class="lg:hidden transition-all duration-300 overflow-hidden" [class.max-h-0]="!menuOpen()" [class.max-h-96]="menuOpen()">
    <div class="px-4 pt-2 pb-6 space-y-1 bg-slate-50 border-t border-slate-100">
      <a routerLink="/" (click)="closeMenu()" class="block px-4 py-3 text-base font-bold text-slate-700 hover:text-blue-600 rounded-xl">Inicio</a>
      <a routerLink="/servicios" (click)="closeMenu()" class="block px-4 py-3 text-base font-bold text-slate-700 hover:text-blue-600 rounded-xl">Servicios</a>
      <a routerLink="/nosotros" (click)="closeMenu()" class="block px-4 py-3 text-base font-bold text-slate-700 hover:text-blue-600 rounded-xl">Nosotros</a>
      <a routerLink="/testimonios" (click)="closeMenu()" class="block px-4 py-3 text-base font-bold text-slate-700 hover:text-blue-600 rounded-xl">Testimonios</a>
      <a routerLink="/contacto" (click)="closeMenu()" class="block px-4 py-3 text-base font-bold text-slate-700 hover:text-blue-600 rounded-xl">Contacto</a>
      
      <div class="pt-4 border-t border-slate-200">
        <ng-container *ngIf="!isLoggedIn()">
          <button routerLink="/auth" (click)="closeMenu()" 
                  class="w-full bg-blue-600 text-white px-4 py-3 rounded-xl font-bold shadow-lg shadow-blue-200">
            Acceso Pacientes
          </button>
        </ng-container>
        <ng-container *ngIf="isLoggedIn()">
          <div class="bg-white rounded-2xl p-4 shadow-sm border border-slate-100">
            <p class="text-xs font-bold text-slate-400 mb-3 uppercase tracking-widest">Mi Cuenta</p>
            <div class="space-y-2">
              <a routerLink="/perfil" (click)="closeMenu()" class="flex items-center gap-3 text-slate-700 font-semibold py-2">
                <i class="fas fa-user-circle text-blue-500"></i> Mi Perfil
              </a>
              <a routerLink="/historial" (click)="closeMenu()" class="flex items-center gap-3 text-slate-700 font-semibold py-2">
                <i class="fas fa-history text-blue-500"></i> Historial
              </a>
              <a routerLink="/estado-cita" (click)="closeMenu()" class="flex items-center gap-3 text-slate-700 font-semibold py-2">
                <i class="fas fa-calendar-check text-green-500"></i> Estado
              </a>
              <a routerLink="/psico-evaluacion" (click)="closeMenu()" class="flex items-center gap-3 text-slate-700 font-semibold py-2">
                <i class="fas fa-brain text-purple-500"></i> Evaluación
              </a>
              <button (click)="logout(); closeMenu()" class="w-full flex items-center gap-3 text-red-600 font-bold py-2 mt-2">
                <i class="fas fa-sign-out-alt"></i> Salir
              </button>
            </div>
          </div>
        </ng-container>
      </div>
    </div>
  </div>
</nav>
